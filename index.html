<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Unggah Laporan Keuangan Aman</title>
    <!-- Library Otentikasi Resmi Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --primary: #0f172a; /* Warna gelap secure & formal */
            --accent: #0284c7;  /* Biru finansial */
            --success: #10b981;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%; max-width: 480px;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 20px; color: var(--primary); margin: 0 0 10px 0; font-weight: 700; }
        .header p { font-size: 14px; color: #64748b; margin: 0; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px; }
        input[type="file"] {
            width: 100%; padding: 12px;
            border: 2px dashed #cbd5e1; border-radius: 8px;
            background: #f1f5f9; cursor: pointer; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #0369a1; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .hidden { display: none !important; }
        
        /* Desain Progress Bar & Status (Mobile Friendly) */
        .progress-container { margin-top: 20px; background: #e2e8f0; border-radius: 9999px; overflow: hidden; height: 12px; }
        .progress-bar { background: var(--success); width: 0%; height: 100%; transition: width 0.1s linear; }
        .status-text { font-size: 13px; text-align: center; margin-top: 8px; font-weight: 500; color: #475569; }
        
        #googleBtnContainer { display: flex; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <!-- SEKSI 1: GERBANG LOGIN OAUTH -->
    <div id="loginSection">
        <div class="header">
            <h1>Sistem Dokumen Keuangan</h1>
            <p>Otentikasi khusus personel yang diotorisasi.</p>
        </div>
        <div id="googleBtnContainer">
            <!-- Isi data-client_id dengan Client ID asli Anda -->
            <div id="g_id_onload"
                 data-client_id="PASTE_CLIENT_ID_ANDA_DI_SINI"
                 data-context="signin"
                 data-callback="handleCredentialResponse"
                 data-auto_select="false"
                 data-close_on_tap_outside="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
        </div>
    </div>

    <!-- SEKSI 2: FORM UTAMA UPLOAD (TERKUNCI SEBELUM LOGIN) -->
    <div id="uploadSection" class="hidden">
        <div class="header">
            <h1>Unggah Dokumen Keuangan</h1>
            <p id="userWelcome">Selamat datang</p>
        </div>
        
        <div class="form-group">
            <label>Pilih File Laporan (Mendukung 1 GB+)</label>
            <input type="file" id="filePicker">
        </div>
        
        <button id="submitBtn" onclick="initiateResumableUpload()">Mulai Unggah Secara Aman</button>
        
        <div id="progressArea" class="hidden">
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="status-text" id="statusLabel">Menghubungkan ke server enkripsi Google...</div>
        </div>
    </div>
</div>

<script>
    let accessToken = "";
    
    // DAFTARKAN EMAIL 20 TIM ANDA DI SINI
    const ALLOWED_USERS = [
        "pegawai1@gmail.com", 
        "bendahara@kepriprov.go.id"
    ];

    // Menangani Verifikasi Token Akun setelah Pengguna Berhasil Login
    function handleCredentialResponse(response) {
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        
        const userProfile = JSON.parse(jsonPayload);
        
        // Pengecekan Keamanan Ganda di Sisi Klien
        if(ALLOWED_USERS.length > 0 && !ALLOWED_USERS.includes(userProfile.email)) {
            alert("Akses Ditolak: Akun Google Anda tidak terdaftar dalam sistem!");
            return;
        }

        // Meminta Otorisasi Tulis (Write Access) ke Google Drive API
        google.accounts.oauth2.initTokenClient({
            client_id: 'PASTE_CLIENT_ID_ANDA_DI_SINI',
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (tokenResponse) => {
                accessToken = tokenResponse.access_token;
                if (accessToken) {
                    document.getElementById("loginSection").classList.add("hidden");
                    document.getElementById("uploadSection").classList.remove("hidden");
                    document.getElementById("userWelcome").innerText = `Otorisasi Sah: ${userProfile.name}`;
                }
            }
        }).requestAccessToken();
    }

    // Mengunggah File Besar Berbasis Resumable Chunk Upload (Potongan 5MB)
    async function initiateResumableUpload() {
        const filePicker = document.getElementById("filePicker");
        if (filePicker.files.length === 0) { alert("Pilih file terlebih dahulu!"); return; }

        const file = filePicker.files[0];
        const submitBtn = document.getElementById("submitBtn");
        const progressArea = document.getElementById("progressArea");
        const progressBar = document.getElementById("progressBar");
        const statusLabel = document.getElementById("statusLabel");

        submitBtn.disabled = true;
        progressArea.classList.remove("hidden");

        const metadata = { name: file.name, mimeType: file.type };
        
        try {
            // Meminta URL Sesi Khusus dari Google Drive
            const sessionResponse = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${accessToken}`,
                    "Content-Type": "application/json; charset=UTF-8",
                    "X-Upload-Content-Type": file.type,
                    "X-Upload-Content-Length": file.size
                },
                body: JSON.stringify(metadata)
            });

            if (!sessionResponse.ok) throw new Error("Gagal menginisiasi enkripsi jalur Google.");
            
            const uploadLocationUrl = sessionResponse.headers.get("Location");
            
            // Proses memotong file dan mengirim secara estafet
            const chunkSize = 1024 * 1024 * 5; // Potongan per 5 Megabyte
            let startByte = 0;

            while (startByte < file.size) {
                const endByte = Math.min(startByte + chunkSize, file.size);
                const chunk = file.slice(startByte, endByte);
                
                statusLabel.innerText = `Mengirim data aman... (${Math.round((startByte / file.size) * 100)}%)`;

                const chunkResponse = await fetch(uploadLocationUrl, {
                    method: "PUT",
                    headers: {
                        "Content-Range": `bytes ${startByte}-${endByte - 1}/${file.size}`,
                        "Content-Type": file.type
                    },
                    body: chunk
                });

                if (chunkResponse.status === 308) {
                    startByte = endByte;
                    progressBar.style.width = `${(startByte / file.size) * 100}%`;
                } else if (chunkResponse.ok) {
                    progressBar.style.width = "100%";
                    statusLabel.innerText = "Laporan Keuangan Berhasil Tersimpan Berbasis Enkripsi!";
                    statusLabel.style.color = "var(--success)";
                    filePicker.value = "";
                    submitBtn.disabled = false;
                    break;
                } else {
                    throw new Error("Koneksi terputus di tengah jalan.");
                }
            }

        } catch (error) {
            alert("Kesalahan Jaringan/Sistem: " + error.message);
            statusLabel.innerText = "Gagal Mengunggah. Silakan coba kembali.";
            statusLabel.style.color = "red";
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
